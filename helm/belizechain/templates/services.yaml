{{- if .Values.nawal.enabled }}
---
apiVersion: v1
kind: Service
metadata:
  name: nawal-ai
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "belizechain.labels" . | nindent 4 }}
    app: nawal-ai
spec:
  type: {{ .Values.nawal.service.type }}
  ports:
    - port: {{ .Values.nawal.service.port }}
      targetPort: http
      protocol: TCP
      name: http
  selector:
    app: nawal-ai
{{- end }}

