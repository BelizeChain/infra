apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: belizechain

resources:
  - namespace.yaml
  - configmap.yaml
  - secret.yaml
  - blockchain-node.yaml
  - postgres.yaml
  - redis.yaml
  - nawal.yaml
  - kinich.yaml
  - pakit.yaml
  - monitoring.yaml

labels:
  - pairs:
      app.kubernetes.io/managed-by: kustomize
      app.kubernetes.io/part-of: belizechain-platform
    includeSelectors: false

images:
  - name: belizechainacr.azurecr.io/ceiba-node
    newTag: latest
  - name: belizechainacr.azurecr.io/nawal
    newTag: latest
  - name: belizechainacr.azurecr.io/kinich-quantum
    newTag: latest
  - name: belizechainacr.azurecr.io/pakit-storage
    newTag: latest

generatorOptions:
  disableNameSuffixHash: true

configMapGenerator:
  - name: chain-spec-config
    files:
      - chain-spec-dev.json=chain-spec-dev.json
  - name: postgres-init-scripts
    files:
      - init.sql=postgres-init.sql
  - name: prometheus-config
    files:
      - prometheus.yml=prometheus.yml
  - name: grafana-dashboards
    files:
      - dashboard.yml=grafana-dashboard.yml
  - name: grafana-datasources
    files:
      - datasources.yml=grafana-datasources.yml
